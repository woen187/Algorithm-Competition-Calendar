<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记录名称和时间</title>
</head>
<body>
    <h3>这是一个记录名称和时间的网页</h3>
    <p>这是一个段落标签</p>
    <p>
        更改文本样式:<b>加粗</b> <i>斜体</i> <u>下划线</u>
    
    </p>
    <u1>
        <li>这是一个列表项</li>
        <li>这是另一个列表项</li>
    </u1>
    <o1>
        <li>这是一个有序列表项</li>
        <li>这是另一个有序列表项</li>
    </o1>

    <table border="1">
        <tr>
            <th>比赛名称</th>
            <th>比赛时间</th>
        </tr>
        <tr>
            <td>洛谷基础赛</td>
            <td>2024-06-01</td>
        </tr>
    </table>
</body>
</html>
